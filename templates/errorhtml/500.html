{% extends "base.html" %}

{% block title %}500 Internal Server Error{% endblock %}

{% block content %}
<div class="grid grid-cols-1 gap-4">

        <button type="button" class="btn btn-primary" onclick="history.back()">Back</button>
    </div>
</div>
{% endblock %}
