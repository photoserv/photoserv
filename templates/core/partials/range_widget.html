<div class="mb-3">
    <div class="flex flex-row items-center justify-evenly">
        {% for subwidget in widget.subwidgets %}
            <div>
                {% include subwidget.template_name with widget=subwidget %}
            </div>
            {% if not forloop.last %}<span class="px-1 md:px-2">to</span>{% endif %}
        {% endfor %}
    </div>
</div>
